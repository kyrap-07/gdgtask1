```html
<!DOCTYPE html>
<html>
<head>
<title>Kanban Board</title>

<style>

body{
font-family: "JetBrains Mono", monospace;
margin:0;
padding:0;
text-align:center;
background:linear-gradient(120deg,#a8edea,#fed6e3);
}

/* TITLE */

h1{
letter-spacing:8px;
margin-top:40px;
color:#5d5d81;
}

/* INPUT AREA */

.controls{
margin:25px;
}

input{
padding:12px;
width:260px;
border-radius:20px;
border:none;
outline:none;
}

button{
padding:10px 18px;
margin-left:8px;
border:none;
border-radius:20px;
background:#6c63ff;
color:white;
cursor:pointer;
}

button:hover{
background:#584ff2;
}

/* BOARD */

.board{
display:flex;
justify-content:center;
gap:20px;
padding:30px;
position:relative;
z-index:5;
}

/* COLUMNS */

.column{
width:200px;
min-height:350px;
padding:15px;
border-radius:18px;
background:rgba(255,255,255,0.45);
backdrop-filter:blur(8px);
border:2px solid rgba(255,255,255,0.4);
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:all 0.3s ease;
}

.column:hover{
box-shadow:0 0 20px rgba(140,120,255,0.7);
border-color:#8a7cff;
transform:translateY(-3px);
}

.column h3{
color:#5d5d81;
}

/* CARDS */

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
cursor:grab;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.card-text{
display:block;
margin-bottom:6px;
}

.remove{
color:#ff5c5c;
font-size:12px;
cursor:pointer;
}

.remove:hover{
text-decoration:underline;
}

/* BIG ICONS */

.icon{
position:fixed;
font-size:90px;
opacity:0.6;
pointer-events:none;
}

.palette{
top:20px;
left:20px;
}

.rocket{
top:20px;
right:20px;
}

.plant{
bottom:20px;
left:20px;
}

</style>
</head>


<body>

<div class="icon palette">🎨</div>
<div class="icon rocket">🚀</div>
<div class="icon plant">🪴</div>

<h1>KANBAN BOARD</h1>

<div class="controls">

<input id="taskInput" placeholder="Add a task, brainstorm, or plan...">

<button onclick="addTask()">Add Task</button>
<button onclick="addBrainstorm()">Brainstorm</button>
<button onclick="addPlan()">Plan</button>

</div>


<div class="board">

<div class="column" id="todo" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>TO DO</h3>
</div>

<div class="column" id="upnext" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>UP NEXT</h3>
</div>

<div class="column" id="progress" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>IN PROGRESS</h3>
</div>

<div class="column" id="review" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>IN REVIEW</h3>
</div>

<div class="column" id="complete" ondragover="allowDrop(event)" ondrop="drop(event)">
<h3>COMPLETE</h3>
</div>

</div>


<script>

function createCard(text,column,id){

const card=document.createElement("div");

card.className="card";
card.id=id;
card.draggable=true;

card.ondragstart=drag;

card.innerHTML=`
<span class="card-text">${text}</span>
<div class="remove" onclick="removeTask('${id}')">Remove</div>
`;

document.getElementById(column).appendChild(card);

saveBoard();

}

/* ADD TASK */

function addTask(){

const input=document.getElementById("taskInput");

if(input.value.trim()=="") return;

createCard(input.value,"todo","card-"+Date.now());

input.value="";

}

/* BRAINSTORM */

function addBrainstorm(){

const input=document.getElementById("taskInput");

if(input.value.trim()=="") return;

createCard("💡 "+input.value,"todo","card-"+Date.now());

input.value="";

}

/* PLAN */

function addPlan(){

const input=document.getElementById("taskInput");

if(input.value.trim()=="") return;

createCard("📌 "+input.value,"upnext","card-"+Date.now());

input.value="";

}

/* REMOVE */

function removeTask(id){

document.getElementById(id).remove();

saveBoard();

}

/* DRAG */

function allowDrop(ev){
ev.preventDefault();
}

function drag(ev){
ev.dataTransfer.setData("text",ev.target.id);
}

function drop(ev){

ev.preventDefault();

const data=ev.dataTransfer.getData("text");

let target=ev.target;

while(target && !target.classList.contains("column")){
target=target.parentElement;
}

if(target){
target.appendChild(document.getElementById(data));
saveBoard();
}

}

/* SAVE BOARD */

function saveBoard(){

const columns=["todo","upnext","progress","review","complete"];

let data={};

columns.forEach(col=>{

data[col]=[];

document.querySelectorAll(`#${col} .card`).forEach(card=>{

data[col].push(
card.querySelector(".card-text").innerText
);

});

});

localStorage.setItem("kanbanData",JSON.stringify(data));

}

/* LOAD BOARD */

function loadBoard(){

const saved=JSON.parse(localStorage.getItem("kanbanData"));

if(!saved) return;

Object.keys(saved).forEach(col=>{

saved[col].forEach(text=>{

createCard(text,col,"card-"+Date.now()+Math.random());

});

});

}

loadBoard();

</script>

</body>
</html>
